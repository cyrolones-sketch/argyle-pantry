services:
  - type: web
    name: argyle-pantry
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "npm start"
    envVars:
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_FROM
        value: "Argyle Pantry <orders@argylepantry.com.au>"
      - key: EMAIL_TO
        value: cyrolones@gmail.com
      - key: HOST
        value: 0.0.0.0
      - key: SMTP_PASS
        sync: false
